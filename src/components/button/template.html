<button
  part="control"
  class="nds-button__control"
  [type]="type"
  [disabled]="disabled"
  [name]="name"
  [value]="value"
  [attr.aria-describedby]="ariaDescribedBy || null"
  [attr.aria-label]="ariaLabel || null"
  [attr.aria-labelledby]="ariaLabelledBy || null"
  (click)="handleControlClick($event)"
>
  <span part="label" class="nds-button__label">
    <slot>{{ label }}</slot>
  </span>
</button>
